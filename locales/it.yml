it:
  sidebar:
    top_label: Registri
    bottom_label: |-
      Registro attuale:
      %{tracker}
    empty_bottom_label: |-
      Registro attuale:
      Nessuno

  calendar:
    months:
      "1": Gennaio
      "2": Febbraio
      "3": Marzo
      "4": Aprile
      "5": Maggio
      "6": Giugno
      "7": Luglio
      "8": Agosto
      "9": Settembre
      "10": Ottobre
      "11": Novembre
      "12": Dicembre
    short_weekdays:
      "0": Lun
      "1": Mar
      "2": Mer
      "3": Gio
      "4": Ven
      "5": Sab
      "6": Dom

  checks:
    zero: Nessuna spunta
    one: Una spunta
    many: "%{count} spunte"

  actions:
    cancel: Annulla
    save: Salva
    confirm: Conferma
    back: Indietro

  alter_tracker:
    new_tracker: Nuovo Registro
    new_tracker_placeholder: Inserisci il nome del registro
    edit_tracker: |-
      Modifica Registro
      "%{tracker}"
    edit_tracker_placeholder: Inserisci il nome del registro
    name: "Nome registro:"
    color: "Colore registro:"
    warning1: "* Il nome non può essere vuoto."
    warning2: "* Nome già in uso."

  theme:
    label: "Tema:"
    light: Chiaro
    dark: Scuro
    current_color: "Colore attuale:"
    colors: "Colori:"
    default: "(Predefinito)"
    language: "Lingua:"
    current_language: "Lingua attuale:"
    custom_themes: "Temi personalizzati"
    dark_mode_only: "Temi solo per modalità scura:"
    light_mode_only: "Temi solo per modalità chiara:"
    option_switch: "Nascondi i pop-up del nuovo anno:"

  delete:
    tracker:
      label: |- 
        Sei sicuro di voler
        eliminare il registro
        "%{tracker}"?
      warning: |-
        Perderai tutti gli anni
        e le relative spunte.

        Questa azione è irreversibile.
    year:
      label: |- 
        Sei sicuro di voler
        eliminare l'anno %{year}?
      warning: |-
        Puoi ricreare l'anno ma
        perderai tutte le spunte.

        Questa azione è irreversibile.

  config:
    tracker: "Registro: %{tracker}"
    year_number: "Numero di anni in memoria: %{years}"
    days_checked: "Giorni segnati: %{days}"
    single_year: "Anno: %{year}"
    top_year: "Anno più recente: %{year}"
    bottom_year: "Anno più vecchio: %{year}"
    single_year_warning: |-
      Unico anno salvato in memoria.

      Un registro deve contenere
      almeno un anno.

  new_year:
    label: "Nuovo Anno: %{year}"
    warning: |-
      Confermi la creazione?
      Questa azione aumenterà le
      dimensioni del database.
    checkbox: "Non chiedere più"

  forbidden_frame:
    label: Non hai ancora nessun registro.
    info: |-
      Aggiungi un nuovo registro
      cliccando sul pulsante '+' nella barra laterale
      per visualizzare un calendario.

      Oppure usa uno degli esempi qui sotto.
    example_trackers:
      job: Lavoro
      college: Università
      medicine: Farmaci
      exercises: Allenamenti