      label: |- 
        Tem certeza que deseja
        deletar o marcador
        "%{tracker}"?
      warning: |-
        Você perderá todos os anos
        e marcações associadas.

        Essa ação é irreversível.
    year:
      label: |-
        Tem certeza que deseja
        deletar o ano %{year}?
      warning: |-
        Você pode criar o ano novamente
        mas perderá qualquer marcação.

        Essa ação é irreversível.

  config:
    tracker: "Marcador: %{tracker}"
