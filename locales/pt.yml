    single_year_warning: |-
      Único ano salvo na memória.

      Um marcador deve conter
      pelo menos um ano.

  new_year:
    label: "Novo Ano: %{year}"
    warning: |-
      Confirmar a criação do ano?
      Essa ação aumentará o tamanho
