      "6": Juin
      "7": Juillet
      "8": Août
      "9": Septembre
      "10": Octobre
      "11": Novembre
      "12": Décembre
    short_weekdays:
      "0": Lun
      "1": Mar
      "2": Mer
      "3": Jeu
      "4": Ven
      "5": Sam
      "6": Dim

  checks:
    zero: Aucune marque
    one: Une marque
    many: "%{count} marques"

  actions:
    cancel: Annuler
    save: Enregistrer
    confirm: Confirmer
    back: Retour

  alter_tracker:
    new_tracker: Nouveau Suivi
    new_tracker_placeholder: Entrez le nom du suivi
    edit_tracker: |-
      Modifier le Suivi
      "%{tracker}"
    edit_tracker_placeholder: Entrez le nom du suivi
    name: "Nom du suivi :"
    color: "Couleur du suivi :"
    warning1: "* Le nom ne peut pas être vide."
    warning2: "* Ce nom est déjà utilisé."

  theme:
    label: "Thème :"
    light: Clair
    dark: Sombre
    current_color: "Couleur actuelle :"
    colors: "Couleurs :"
    default: "(Par défaut)"
    custom_themes: "Thèmes personnalisés"
    dark_mode_only: "Thèmes mode sombre uniquement :"
    light_mode_only: "Thèmes mode clair uniquement :"

  delete:
    tracker:
      label: |- 
        Êtes-vous sûr de vouloir
        supprimer le suivi
        "%{tracker}" ?
      warning: |-
        Vous perdrez toutes les années
        et leurs marques.

        Cette action est irréversible.
    year:
      label: |- 
        Êtes-vous sûr de vouloir
        supprimer l'année %{year} ?
      warning: |-
        Vous pouvez recréer l'année mais
        vous perdrez toutes ses marques.

        Cette action est irréversible.

  config:
    tracker: "Suivi : %{tracker}"
    year_number: "Nombre d'années en mémoire : %{years}"
    days_checked: "Jours marqués : %{days}"
    single_year: "Année : %{year}"
    top_year: "Année la plus récente : %{year}"
    bottom_year: "Année la plus ancienne : %{year}"
    single_year_warning: |-
      Seule année sauvegardée.

      Un suivi doit contenir
      au moins une année.

  new_year:
    label: "Nouvelle Année : %{year}"
    warning: |-
      Confirmer la création ?
      Cette action augmentera la
      taille de la base de données.
    checkbox: "Ne plus demander"

  forbidden_frame:
    label: Vous n'avez encore aucun suivi.
    info: |-
      Ajoutez un nouveau suivi
      en cliquant sur le bouton '+' dans la barre latérale
      pour afficher un calendrier.

      Ou utilisez l’un des exemples ci-dessous.
    example_trackers:
      job: Travail
      college: Université
      medicine: Médicaments
      exercises: Entraînements

  settings:
    language: "Langue :"
    current_language: "Langue actuelle :"
    option_switch: "Masquer les pop-ups de nouvelle année :"
    management: "Gestion :"
    themes: "Thèmes"
    backup: "Sauvegarde"

  backup:
    time: "%d/%m/%Y à %H:%M"
    today_time: "Aujourd'hui à %H:%M"
    yesterday_time: "Hier à %H:%M"
    last_backup: "Dernière sauvegarde :"
    save: "Enregistrer"
    restore: "Restaurer"
    export: "Exporter"
    import: "Importer"
    title_save_restore: "Enregistrer/Restaurer la sauvegarde :"
    title_import_export: "Importer/Exporter la sauvegarde :"
    backup_info: |-
      Vous pouvez créer un point de restauration rapide dans
      l'application elle-même pour éviter de perdre vos données.
    export_info: |-
      Vous pouvez générer une copie de la base de données
      à enregistrer localement.
    no_backup: "Aucune"

  save_backup:
    label: Enregistrer la sauvegarde
    message: |-
      Cette action remplacera la sauvegarde
      locale par les données actuelles.
  
  restore_backup:
    label: Restaurer la sauvegarde
    message: |-
      Cette action remplacera les données actuelles
      par celles enregistrées dans la sauvegarde.

      Toute modification effectuée après la
      création de la sauvegarde sera perdue.
      
      Assurez-vous d'exporter vos données
      pour ne rien perdre d'important.

  import_backup:
    label: Importer des données
    message: |-
      Cette action remplacera les données actuelles
      par celles enregistrées dans le fichier.

      Assurez-vous d'exporter vos données
      pour ne rien perdre d'important.