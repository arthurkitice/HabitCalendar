ru:  
  sidebar:
    top_label: Трекеры
    bottom_label: |-
      Текущий трекер:
      %{tracker}
    empty_bottom_label: |-
      Текущий трекер:
      Не выбран

  calendar:
    months:
      "1": Январь
      "2": Февраль
      "3": Март
      "4": Апрель
      "5": Май
      "6": Июнь
      "7": Июль
      "8": Август
      "9": Сентябрь
      "10": Октябрь
      "11": Ноябрь
      "12": Декабрь
    short_weekdays:
      "0": Пн
      "1": Вт
      "2": Ср
      "3": Чт
      "4": Пт
      "5": Сб
      "6": Вс

  checks:
    zero: Нет отметок
    one: "Отметки: %{count}"
    many: "Отметки: %{count}"

  actions:
    cancel: Отмена
    save: Сохранить
    confirm: Подтвердить
    back: Назад

  alter_tracker:
    new_tracker: Новый трекер
    new_tracker_placeholder: Введите название нового трекера
    edit_tracker: |-
      Редактировать трекер
      "%{tracker}"
    edit_tracker_placeholder: Введите название трекера
    name: "Название трекера:"
    color: "Цвет трекера:"
    warning1: "* Название не может быть пустым."
    warning2: "* Это название уже занято."

  theme:
    label: "Тема:"
    light: Светлая
    dark: Темная
    current_color: "Текущий цвет:"
    colors: "Цвета:"
    default: "(По умолчанию)"
    custom_themes: "Свои темы"
    dark_mode_only: "Темы только для темного режима:"
    light_mode_only: "Темы только для светлого режима:"

  delete:
    tracker:
      label: |- 
        Вы уверены, что хотите 
        удалить трекер
        "%{tracker}"?
      warning: |-
        Вы потеряете все годы 
        и связанные с ними отметки.

        Это действие необратимо.
    year:
      label: |- 
        Вы уверены, что хотите
        удалить %{year} год?
      warning: |-
        Вы можете создать год заново, 
        но потеряете все отметки за него.

        Это действие необратимо.

  config:
    tracker: "Трекер: %{tracker}"
    year_number: "Количество лет в памяти: %{years}"
    days_checked: "Отмеченных дней: %{days}"
    single_year: "Год: %{year}"
    top_year: "Самый новый год: %{year}"
    bottom_year: "Самый ранний год: %{year}"
    single_year_warning: |-
      Единственный год, сохраненный в памяти.

      Трекер должен содержать
      хотя бы один год.

  new_year:
    label: "Новый год: %{year}"
    warning: |-
      Подтверждаете создание?
      Это действие увеличит размер
      базы данных.
    checkbox: "Больше не спрашивать"

  forbidden_frame:
    label: У вас пока нет трекеров.
    info: |-
      Добавьте новый трекер,
      нажав кнопку '+' на боковой панели,
      чтобы открыть календарь.

      Или используйте один из примеров ниже.
    example_trackers:
      job: Работа
      college: Учёба
      medicine: Лекарства
      exercises: Тренировки

  settings:
    language: "Язык:"
    current_language: "Текущий язык:"
    option_switch: "Скрыть окна нового года:"
    management: "Управление:"
    themes: "Темы"
    backup: "Бэкап"