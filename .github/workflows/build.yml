name: Build HabitCalendar

on:
  release:
    types: [created]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pango pkg-config
          echo "DYLD_LIBRARY_PATH=$(brew --prefix cairo)/lib:$(brew --prefix pango)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix cairo)/lib/pkgconfig:$(brew --prefix pango)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $url = "https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2022-01-04/gtk3-runtime-3.24.31-2022-01-04-ts-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile gtk-installer.exe
          Start-Process -FilePath gtk-installer.exe -ArgumentList "/S" -Wait
          echo "C:\Program Files\GTK3-Runtime Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate icon PNG (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python3 -c "
          import cairosvg, os
          cairosvg.svg2png(url='file://'+os.path.abspath('ui/icons/app_icon.svg'), output_width=256, output_height=256, write_to='icon.png')
          "

      - name: Generate icon PNG (Windows)
        if: runner.os == 'Windows'
        run: |
          python -c "import cairosvg, os; cairosvg.svg2png(url='file:///'+os.path.abspath('ui/icons/app_icon.svg').replace(chr(92), '/'), output_width=256, output_height=256, write_to='icon.png')"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed \
            --name "HabitCalendar-linux" \
            --icon "icon.png" \
            --add-data "locales:locales" \
            --add-data "ui/icons:ui/icons" \
            --add-data "icon.png:." \
            --hidden-import "PIL._tkinter_finder" \
            --hidden-import "PIL._imagingtk" \
            main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed \
            --name "HabitCalendar-macos" \
            --icon "icon.png" \
            --add-data "locales:locales" \
            --add-data "ui/icons:ui/icons" \
            --add-data "icon.png:." \
            --hidden-import "PIL._tkinter_finder" \
            --hidden-import "PIL._imagingtk" \
            main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed `
            --name "HabitCalendar-windows" `
            --icon "icon.png" `
            --add-data "locales;locales" `
            --add-data "ui/icons;ui/icons" `
            --add-data "icon.png;." `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "PIL._imagingtk" `
            main.py

      - name: Create .deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo gem install fpm
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp dist/HabitCalendar-linux pkg/usr/bin/habitcalendar
          chmod +x pkg/usr/bin/habitcalendar

          cp ui/icons/app_icon.svg pkg/usr/share/icons/hicolor/256x256/apps/habitcalendar.png

          cat > pkg/usr/share/applications/habitcalendar.desktop << EOF
          [Desktop Entry]
          Name=HabitCalendar
          Comment=Track your daily habits
          Exec=/usr/bin/habitcalendar
          Icon=habitcalendar
          Terminal=false
          Type=Application
          Categories=Utility;
          StartupWMClass=HabitCalendar
          EOF

          fpm -s dir -t deb \
            -n habitcalendar \
            -v ${{ github.ref_name }} \
            --architecture amd64 \
            --description "A minimalist desktop app for tracking daily habits" \
            --maintainer "arthurkitice" \
            --url "https://github.com/arthurkitice/HabitCalendar" \
            -C pkg \
            .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HabitCalendar-linux
            dist/HabitCalendar-macos
            dist/HabitCalendar-windows.exe
            *.deb