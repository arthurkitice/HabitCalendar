name: Build HabitCalendar

on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pango pkg-config
          echo "DYLD_LIBRARY_PATH=$(brew --prefix cairo)/lib:$(brew --prefix pango)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix cairo)/lib/pkgconfig:$(brew --prefix pango)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install pkgconfiglite

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate icon PNG (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python3 -c "
          import cairosvg, os
          cairosvg.svg2png(url='file://'+os.path.abspath('ui/icons/app_icon.svg'), output_width=256, output_height=256, write_to='icon.png')
          "

      - name: Generate icon PNG (Windows)
        if: runner.os == 'Windows'
        run: |
          python -c "import cairosvg, os; cairosvg.svg2png(url='file:///'+os.path.abspath('ui/icons/app_icon.svg').replace(chr(92), '/'), output_width=256, output_height=256, write_to='icon.png')"

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --windowed \
            --name "HabitCalendar" \
            --icon "icon.png" \
            --add-data "locales:locales" \
            --add-data "ui/icons:ui/icons" \
            --add-data "icon.png:." \
            --hidden-import "PIL._tkinter_finder" \
            --hidden-import "PIL._imagingtk" \
            main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed `
            --name "HabitCalendar" `
            --icon "icon.png" `
            --add-data "locales;locales" `
            --add-data "ui/icons;ui/icons" `
            --add-data "icon.png;." `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "PIL._imagingtk" `
            main.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HabitCalendar*