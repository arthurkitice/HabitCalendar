name: Build HabitCalendar

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Instala UPX no Linux
      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o upx.tar.xz https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz
          tar -xf upx.tar.xz
          sudo cp upx-4.2.4-amd64_linux/upx /usr/local/bin/
          upx --version

      # Instala UPX no Windows usando Chocolatey (Novo)
      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed --strip --optimize 2 \
            --upx-dir /usr/local/bin \
            --name "HabitCalendar-linux" \
            --icon "icon.png" \
            --add-data "locales:locales" \
            --add-data "ui/icons:ui/icons" \
            --add-data "icon.png:." \
            --hidden-import "PIL._tkinter_finder" \
            --hidden-import "PIL._imagingtk" \
            --exclude-module "tkinter.test" \
            --exclude-module "sqlite3.test" \
            --exclude-module "test" \
            --exclude-module "pydoc" \
            --exclude-module "bdb" \
            --exclude-module "pdb" \
            --exclude-module "xmlrpc" \
            --exclude-module "http.server" \
            main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --strip --optimize 2 \
            --name "HabitCalendar-macos" \
            --icon "icon.png" \
            --add-data "locales:locales" \
            --add-data "ui/icons:ui/icons" \
            --add-data "icon.png:." \
            --hidden-import "PIL._tkinter_finder" \
            --hidden-import "PIL._imagingtk" \
            --exclude-module "tkinter.test" \
            --exclude-module "sqlite3.test" \
            --exclude-module "test" \
            --exclude-module "pydoc" \
            --exclude-module "bdb" \
            --exclude-module "pdb" \
            --exclude-module "xmlrpc" \
            --exclude-module "http.server" \
            main.py

      # Comprime o arquivo .app do macOS para não corromper no Release (Novo)
      - name: Zip macOS App
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r HabitCalendar-macos.zip HabitCalendar-macos.app

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --strip --optimize 2 `
            --name "HabitCalendar-windows" `
            --icon "icon.png" `
            --add-data "locales;locales" `
            --add-data "ui/icons;ui/icons" `
            --add-data "icon.png;." `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "PIL._imagingtk" `
            --exclude-module "tkinter.test" `
            --exclude-module "sqlite3.test" `
            --exclude-module "test" `
            --exclude-module "pydoc" `
            --exclude-module "bdb" `
            --exclude-module "pdb" `
            --exclude-module "xmlrpc" `
            --exclude-module "http.server" `
            main.py

      - name: Create .deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo gem install fpm
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp dist/HabitCalendar-linux pkg/usr/bin/habitcalendar
          chmod +x pkg/usr/bin/habitcalendar

          cp icon.png pkg/usr/share/icons/hicolor/256x256/apps/habitcalendar.png
          sudo gtk-update-icon-cache /usr/share/icons/hicolor/ 2>/dev/null || true

          cat > pkg/usr/share/applications/habitcalendar.desktop << EOF
          [Desktop Entry]
          Name=HabitCalendar
          Comment=Track your daily habits
          Exec=/usr/bin/habitcalendar
          Icon=habitcalendar
          Terminal=false
          Type=Application
          Categories=Utility;
          StartupWMClass=HabitCalendar
          EOF

          fpm -s dir -t deb \
            -n habitcalendar \
            -v 0.0.0-nightly \
            --architecture amd64 \
            -p HabitCalendar-linux.deb \
            --description "A minimalist desktop app for tracking daily habits" \
            --maintainer "arthurkitice" \
            --url "https://github.com/arthurkitice/HabitCalendar" \
            -C pkg \
            .

      - name: Atualizar Release de Teste (Nightly)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "nightly"
          name: "Versão de Teste Contínuo"
          body: "Esta versão é atualizada automaticamente a cada novo commit enviado ao repositório. Use-a apenas para testes."
          prerelease: true
          make_latest: false
          files: |
            dist/HabitCalendar-linux
            dist/HabitCalendar-macos.zip
            dist/HabitCalendar-windows.exe
            HabitCalendar-linux.deb